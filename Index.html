<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Catalogue</title>

<style>
body {
  font-family: 'Georgia', serif;
  background: #f8f6f2;
  padding: 15px;
  color: #222;
}

.header {
  text-align: center;
}

.logo {
  height: 60px;
}

.brand {
  font-size: 20px;
  margin-top: 5px;
}

.catalogue {
  text-align: center;
  font-size: 22px;
  margin: 15px 0;
}

.search {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border: 1px solid #ccc;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #eee;
}

th {
  background: #f0ede7;
}

.price {
  font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
  <img id="logo" class="logo">
  <div id="brand" class="brand"></div>
</div>

<div id="catalogue" class="catalogue"></div>

<input type="text" id="search" class="search" placeholder="Search variants...">

<table>
<thead>
<tr>
  <th>Variant</th>
  <th>GST</th>
  <th>HSN</th>
  <th>RRP</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

<script>
const API = "https://script.google.com/macros/s/AKfycbz-PgHsEI_GpQYjzxqUP47S0SLXC6QAj6ddnQ_8gAU9SznOWJLMzPkNde1U29IfLcZc/exec";

const params = new URLSearchParams(window.location.search);
const id = params.get("catalogue_id");

if (!id) {
  document.body.innerHTML = "<h3>Invalid catalogue link</h3>";
}

let allProducts = [];

fetch(API + "?catalogue_id=" + id)
.then(r => r.json())
.then(d => {

  if (d.error) {
    document.body.innerHTML = "<h3>" + d.error + "</h3>";
    return;
  }

  document.getElementById("logo").src = d.brand.logo;
  document.getElementById("brand").innerText = d.brand.name;
  document.getElementById("catalogue").innerText = d.catalogue;

  allProducts = d.products;
  render(allProducts);
});

function render(products) {
  let html = "";
  products.forEach(p => {
    html += `
    <tr>
      <td>${p.name}</td>
      <td>${p.gst}%</td>
      <td>${p.hsn}</td>
      <td class="price">₹ ${p.price}</td>
    </tr>`;
  });
  document.getElementById("data").innerHTML = html;
}

document.getElementById("search").addEventListener("input", function() {
  const value = this.value.toLowerCase();
  const filtered = allProducts.filter(p =>
    p.name.toLowerCase().includes(value)
  );
  render(filtered);
});
</script>

</body>
</html>
