<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pricelist</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  padding: 15px 30px;
  background: white;
  border-bottom: 1px solid #ddd;
}

.logo {
  height: 40px;
}

.title {
  text-align: center;
  font-size: 24px;
  margin: 20px 0;
  letter-spacing: 2px;
}

/* TABLE */
.container {
  width: 90%;
  margin: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th {
  background: #222;
  color: white;
  padding: 12px;
  text-align: left;
}

td {
  padding: 12px;
  border-bottom: 1px solid #eee;
}

.right {
  text-align: right;
}

/* FOOTER */
.footer {
  width: 90%;
  margin: 20px auto;
  display: flex;
  justify-content: space-between;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="header">
  <img id="logo" class="logo">
</div>

<div class="title" id="catalogue"></div>

<div class="container">

<table>
<thead>
<tr>
  <th>QUALITY</th>
  <th>HSN CODE</th>
  <th>GST RATE %</th>
  <th>RRP (₹)</th>
  <th>GST AMOUNT (₹)</th>
  <th>Total (₹)</th>
</tr>
</thead>

<tbody id="data"></tbody>

</table>

</div>

<div class="footer">
  <div>© 2025 - Pricelist</div>
  <div id="date"></div>
</div>

<script>
const API = "https://sheetdb.io/api/v1/z4rjokjijd72d";

const id = new URLSearchParams(window.location.search).get("catalogue_id");

fetch(API + "/search?CatalogueID=" + id)
.then(r => r.json())
.then(data => {

  if (!data.length) {
    document.body.innerHTML = "No data found";
    return;
  }

  // Header
  document.getElementById("logo").src = data[0].LogoURL;
  document.getElementById("catalogue").innerText = data[0].CatalogueName;

  let html = "";

  data.forEach(p => {

    const rrp = parseFloat(p.RRP || 0);
    const gst = parseFloat(p.GST || 0);

    const gstAmount = (rrp * gst / 100).toFixed(2);
    const total = (rrp + parseFloat(gstAmount)).toFixed(2);

    html += `
    <tr>
      <td>${p.VariantName}</td>
      <td>${p.HSN}</td>
      <td>${p.GST}</td>
      <td class="right">${rrp}</td>
      <td class="right">${gstAmount}</td>
      <td class="right">${total}</td>
    </tr>`;
  });

  document.getElementById("data").innerHTML = html;

  document.getElementById("date").innerText =
    "With effect from " + new Date().toLocaleDateString();
});
</script>

</body>
</html>
