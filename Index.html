<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Catalogue</title>

<style>
body {
  font-family: 'Georgia', serif;
  background: #f8f6f2;
  padding: 15px;
}

.header { text-align: center; }
.logo { height: 60px; }
.brand { font-size: 20px; }
.catalogue { text-align:center; font-size:22px; margin:15px 0; }

.search {
  width:100%;
  padding:10px;
  margin-bottom:10px;
}

table {
  width:100%;
  border-collapse: collapse;
  background:#fff;
}

th, td {
  padding:10px;
  border-bottom:1px solid #eee;
}

th { background:#f0ede7; }

.price { font-weight:bold; }
</style>
</head>

<body>

<div class="header">
  <div class="brand" id="brand"></div>
</div>

<div id="catalogue" class="catalogue"></div>

<input type="text" id="search" class="search" placeholder="Search...">

<table>
<tr>
  <th>Variant</th>
  <th>GST</th>
  <th>HSN</th>
  <th>RRP</th>
</tr>
<tbody id="data"></tbody>
</table>

<script>
const API = "https://sheetdb.io/api/v1/z4rjokjijd72d";

const params = new URLSearchParams(window.location.search);
const catalogueId = params.get("catalogue_id");

if (!catalogueId) {
  document.body.innerHTML = "Invalid QR";
}

// Fetch filtered data
fetch(API + "/search?CatalogueID=" + catalogueId)
.then(res => res.json())
.then(data => {

  let all = data;
  render(all);

  document.getElementById("search").addEventListener("input", function() {
    const val = this.value.toLowerCase();
    const filtered = all.filter(x => 
      x.VariantName.toLowerCase().includes(val)
    );
    render(filtered);
  });
});

function render(data) {
  let html = "";
  data.forEach(p => {
    html += `
    <tr>
      <td>${p.VariantName}</td>
      <td>${p.GST}%</td>
      <td>${p.HSN}</td>
      <td class="price">₹ ${p.RRP}</td>
    </tr>`;
  });
  document.getElementById("data").innerHTML = html;
}
</script>

</body>
</html>
