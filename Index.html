<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Catalogue</title>

<style>
body {
  font-family: Georgia;
  background:#f5f3ef;
  margin:0;
}

.header {
  text-align:center;
  padding:20px;
  background:#fff;
}

.logo { height:60px; }

.container { padding:15px; }

.search {
  width:100%;
  padding:12px;
  margin-bottom:10px;
}

.card {
  background:#fff;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
}

.price { font-weight:bold; }
.meta { font-size:12px; color:#777; }
</style>
</head>

<body>

<div class="header">
  <img id="logo" class="logo">
  <div id="brand"></div>
  <div id="catalogue"></div>
</div>

<div class="container">

<input id="search" class="search" placeholder="Search...">

<div id="data"></div>

</div>

<script>
const API = "https://sheetdb.io/api/v1/z4rjokjijd72d";

const id = new URLSearchParams(window.location.search).get("catalogue_id");

if (!id) {
  document.body.innerHTML = "Invalid catalogue link";
}

let all = [];

fetch(API + "/search?CatalogueID=" + id)
.then(r => r.json())
.then(data => {

  if (!data.length) {
    document.body.innerHTML = "No catalogue found";
    return;
  }

  all = data;

  document.getElementById("brand").innerText = data[0].BrandName;
  document.getElementById("catalogue").innerText = data[0].CatalogueName;
  document.getElementById("logo").src = data[0].LogoURL;

  render(all);
});

function render(arr) {
  let html = "";
  arr.forEach(p => {
    html += `
    <div class="card">
      <div><b>${p.VariantName}</b></div>
      <div class="meta">HSN ${p.HSN} | GST ${p.GST}%</div>
      <div class="price">₹ ${p.RRP}</div>
    </div>`;
  });
  document.getElementById("data").innerHTML = html;
}

document.getElementById("search").oninput = e => {
  const v = e.target.value.toLowerCase();
  render(all.filter(x => x.VariantName.toLowerCase().includes(v)));
};
</script>

</body>
</html>
