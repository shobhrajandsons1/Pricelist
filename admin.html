<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  background: #f5f3ef;
}

/* SIDEBAR */
.sidebar {
  width: 250px;
  height: 100vh;
  background: #1e2a44;
  color: white;
  position: fixed;
}

.sidebar h2 {
  padding: 20px;
  color: #f5a623;
}

.menu {
  padding: 10px;
}

.menu div {
  padding: 12px 15px;
  margin: 5px;
  border-radius: 8px;
  cursor: pointer;
}

.menu div:hover {
  background: #2c3b5e;
}

.active {
  background: #f5a623;
  color: black;
}

/* MAIN */
.main {
  margin-left: 250px;
  padding: 20px;
  width: 100%;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
}

.card h3 {
  margin: 0;
  font-size: 14px;
  color: #777;
}

.card p {
  font-size: 28px;
  margin: 5px 0 0;
}

/* TABLE */
table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
  background: white;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #eee;
}

input {
  width: 80px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>The Crafted Corners</h2>

  <div class="menu">
    <div class="active" onclick="showDashboard()">Dashboard</div>
    <div onclick="loadVariants()">Variant Management</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <h1>Dashboard</h1>
  <p>Overview of your interior products business</p>

  <div class="cards">
    <div class="card">
      <h3>Variants</h3>
      <p id="variantCount">0</p>
    </div>
  </div>

  <table id="table"></table>

</div>

<script>
const API = "https://sheetdb.io/api/v1/z4rjokjijd72d";

// DASHBOARD LOAD
function showDashboard() {
  fetch(API)
  .then(r => r.json())
  .then(data => {

    document.getElementById("variantCount").innerText = data.length;

    document.getElementById("table").innerHTML = "";
  });
}

// LOAD VARIANTS
function loadVariants() {
  fetch(API)
  .then(r => r.json())
  .then(data => {

    let html = "<tr><th>Name</th><th>Price</th><th>Update</th></tr>";

    data.forEach(p => {
      html += `
      <tr>
        <td>${p.VariantName || ""}</td>
        <td><input id="${p.VariantID}" value="${p.RRP || ""}"></td>
        <td><button onclick="update('${p.VariantID}')">Save</button></td>
      </tr>`;
    });

    document.getElementById("table").innerHTML = html;
  });
}

// UPDATE PRICE
function update(id) {
  const val = document.getElementById(id).value;

  fetch(API + "/VariantID/" + id, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ data: { RRP: val } })
  })
  .then(() => alert("Updated"));
}

// LOAD DEFAULT
showDashboard();
</script>

</body>
</html>
