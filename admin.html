<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - The Crafted Corners</title>

<style>
/* (KEEPING YOUR ORIGINAL UI — NO CHANGE) */
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI'; background:#f4f6f9; display:flex; }

/* SIDEBAR */
.sidebar {
  width:240px; background:#111827; color:white;
  height:100vh; padding:20px; position:fixed;
}
.menu { padding:12px; margin-bottom:10px; cursor:pointer; border-radius:6px; }
.menu:hover { background:#1f2937; }
.menu.active { background:#3b82f6; }
.logout { margin-top:30px; background:#dc2626; padding:12px; cursor:pointer; border:none; }

/* MAIN */
.main { margin-left:240px; padding:25px; width:100%; }
.card { background:white; padding:25px; border-radius:10px; margin-bottom:20px; display:none; }
.card.active { display:block; }

input, select {
  padding:10px; margin:5px; border:1px solid #ccc;
}
button {
  padding:10px 15px; background:#111827; color:white;
  border:none; cursor:pointer;
}

/* TABLE */
table { width:100%; border-collapse:collapse; margin-top:20px; }
th, td { padding:12px; border-bottom:1px solid #ddd; }

</style>
</head>

<body>

<script>
if (localStorage.getItem("auth") !== "true") {
  window.location.href = "login.html";
}
</script>

<div class="sidebar">
  <h2>The Crafted Corners</h2>
  <div class="menu active" onclick="showTab('dashboard', this)">Dashboard</div>
  <div class="menu" onclick="showTab('brands', this)">Brands</div>
  <div class="menu" onclick="showTab('catalogues', this)">Catalogues</div>
  <div class="menu" onclick="showTab('variants', this)">Variants</div>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="card active">
  <h2>Dashboard</h2>
  <h3>Brands: <span id="brandCount">0</span></h3>
  <h3>Catalogues: <span id="catalogueCount">0</span></h3>
  <h3>Variants: <span id="variantCount">0</span></h3>
</div>

<!-- BRANDS -->
<div id="brands" class="card">
  <h2>Brands</h2>
  <input id="brandName" placeholder="Brand Name">
  <input id="logoURL" placeholder="Logo URL">
  <button onclick="addBrand()">Add</button>

  <table>
    <thead>
      <tr><th>ID</th><th>Name</th><th>Logo</th></tr>
    </thead>
    <tbody id="brandTable"></tbody>
  </table>
</div>

<!-- CATALOGUES -->
<div id="catalogues" class="card">
  <h2>Catalogues</h2>
  <input id="catName" placeholder="Catalogue Name">
  <input id="catBrand" placeholder="Brand ID">
  <input id="catCategory" placeholder="Category">
  <button onclick="addCatalogue()">Add</button>

  <table>
    <thead>
      <tr><th>ID</th><th>Name</th><th>Brand</th></tr>
    </thead>
    <tbody id="catalogueTable"></tbody>
  </table>
</div>

<!-- VARIANTS -->
<div id="variants" class="card">
  <h2>Variants</h2>
  <input id="vName" placeholder="Variant Name">
  <input id="vCat" placeholder="Catalogue ID">
  <input id="vHSN" placeholder="HSN">
  <input id="vGST" placeholder="GST">
  <input id="vRRP" placeholder="RRP">
  <button onclick="addVariant()">Add</button>

  <table>
    <thead>
      <tr><th>ID</th><th>Name</th><th>Catalogue</th></tr>
    </thead>
    <tbody id="variantTable"></tbody>
  </table>
</div>

</div>

<script>
const API = "https://sheetdb.io/api/v1/tbkom437rmn5o";

function showTab(tab, el) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.menu').forEach(m => m.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  el.classList.add('active');
}

function logout() {
  localStorage.removeItem("auth");
  window.location.href = "login.html";
}

/* ===== AUTO VARIANT ID ===== */
async function genVarID() {
  const res = await fetch(API + "?sheet=Variants");
  const data = await res.json();

  if (!data.length) return "VAR001";

  let nums = data.map(v =>
    parseInt((v.VariantID || "").replace("VAR","")) || 0
  );

  let next = Math.max(...nums) + 1;

  return "VAR" + next.toString().padStart(3,"0");
}

/* ===== ADD VARIANT ===== */
async function addVariant() {

  const id = await genVarID();

  const data = {
    VariantID: id,
    CatalogueID: document.getElementById("vCat").value,
    VariantName: document.getElementById("vName").value,
    HSN: document.getElementById("vHSN").value,
    GST: document.getElementById("vGST").value,
    RRP: document.getElementById("vRRP").value
  };

  fetch(API + "?sheet=Variants", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({data:[data]})
  }).then(()=> alert("Added: "+id));
}

/* ===== LOAD DATA ===== */
function loadCounts() {
  fetch(API+"?sheet=Brand").then(r=>r.json()).then(d=>brandCount.innerText=d.length);
  fetch(API+"?sheet=Catalogues").then(r=>r.json()).then(d=>catalogueCount.innerText=d.length);
  fetch(API+"?sheet=Variants").then(r=>r.json()).then(d=>variantCount.innerText=d.length);
}

window.onload = loadCounts;
</script>

</body>
</html>
