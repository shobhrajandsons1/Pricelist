<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      background: #f4f6f9;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      background: #111827;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 20px;
    }

    .menu {
      margin: 10px 0;
      padding: 10px;
      cursor: pointer;
      border-radius: 6px;
    }

    .menu:hover {
      background: #1f2937;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 20px;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 200px;
    }

    button {
      padding: 10px 15px;
      background: #111827;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .logout {
      margin-top: 20px;
      background: red;
    }
  </style>
</head>

<body>

<!-- AUTH CHECK -->
<script>
if (localStorage.getItem("auth") !== "true") {
  window.location.href = "login.html";
}
</script>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Admin Panel</h2>

  <div class="menu" onclick="show('variant')">Add Variant</div>

  <button class="logout" onclick="logout()">Logout</button>
</div>

<!-- MAIN CONTENT -->
<div class="main">

  <!-- VARIANT FORM -->
  <div id="variant">
    <h2>Add Variant</h2>

    <input id="name" placeholder="Variant Name"><br>
    <input id="catalogue" placeholder="Catalogue ID (CAT001)"><br>
    <input id="hsn" placeholder="HSN"><br>
    <input id="gst" placeholder="GST"><br>
    <input id="rrp" placeholder="RRP"><br>

    <button onclick="save()">Save</button>
  </div>

</div>

<script>
const API = "https://sheetdb.io/api/v1/tbkom437rmn5o";

// LOGOUT
function logout() {
  localStorage.removeItem("auth");
  window.location.href = "login.html";
}

// GENERATE VARIANT ID
function generateID() {
  return "VAR" + Math.floor(1000 + Math.random() * 9000);
}

// SAVE DATA
function save() {

  const data = {
    VariantID: generateID(),
    CatalogueID: document.getElementById("catalogue").value,
    VariantName: document.getElementById("name").value,
    HSN: document.getElementById("hsn").value,
    GST: document.getElementById("gst").value,
    RRP: document.getElementById("rrp").value
  };

  fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ data: [data] })
  })
  .then(() => {
    alert("Variant Added Successfully");
  });

}
</script>

</body>
</html>
