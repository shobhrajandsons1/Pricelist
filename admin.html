<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Panel</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 250px;
  height: 100vh;
  background: #111;
  color: #fff;
  overflow-y: auto;
  position: fixed;
}

.sidebar h2 {
  text-align: center;
  padding: 15px;
  border-bottom: 1px solid #333;
}

.menu-item {
  padding: 12px 20px;
  cursor: pointer;
  border-bottom: 1px solid #222;
}

.menu-item:hover {
  background: #222;
}

.submenu {
  display: none;
  background: #1a1a1a;
}

.submenu div {
  padding: 10px 30px;
  font-size: 14px;
}

.submenu div:hover {
  background: #333;
}

/* MAIN CONTENT */
.main {
  margin-left: 250px;
  padding: 20px;
  width: 100%;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

td, th {
  border: 1px solid #ddd;
  padding: 8px;
}

input {
  width: 80px;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <h2>Admin</h2>

  <div class="menu-item" onclick="toggleMenu('catalogueMenu')">
    Catalogues ▼
  </div>
  <div id="catalogueMenu" class="submenu">
    <div onclick="loadVariants()">All Variants</div>
  </div>

  <div class="menu-item" onclick="toggleMenu('brandMenu')">
    Brands ▼
  </div>
  <div id="brandMenu" class="submenu">
    <div>View Brands</div>
  </div>

  <div class="menu-item" onclick="toggleMenu('settingsMenu')">
    Settings ▼
  </div>
  <div id="settingsMenu" class="submenu">
    <div>General</div>
  </div>

</div>

<!-- MAIN -->
<div class="main">

  <h2>Dashboard</h2>

  <table id="table"></table>

</div>

<script>
const API = "https://sheetdb.io/api/v1/z4rjokjijd72d";

// Toggle submenu
function toggleMenu(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === "block" ? "none" : "block";
}

// Load variants
function loadVariants() {
  fetch(API)
  .then(r => r.json())
  .then(d => {

    if (!d.length) {
      document.getElementById("table").innerHTML = "No data found";
      return;
    }

    let html = "<tr><th>Variant</th><th>Price</th><th>Update</th></tr>";

    d.forEach(p => {
      html += `
      <tr>
        <td>${p.VariantName || ""}</td>
        <td><input id="${p.VariantID}" value="${p.RRP || ""}"></td>
        <td><button onclick="update('${p.VariantID}')">Save</button></td>
      </tr>`;
    });

    document.getElementById("table").innerHTML = html;
  });
}

// Update price
function update(id) {
  const val = document.getElementById(id).value;

  fetch(API + "/VariantID/" + id, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ data: { RRP: val } })
  })
  .then(() => alert("Updated"));
}
</script>

</body>
</html>
