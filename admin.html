<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {
      font-family: Arial;
      display: flex;
      margin: 0;
    }

    .sidebar {
      width: 220px;
      background: #1e2a3a;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      color: #f5b041;
    }

    .menu {
      margin-top: 20px;
      cursor: pointer;
      padding: 10px;
      border-radius: 5px;
    }

    .menu:hover {
      background: #2e4053;
    }

    .content {
      flex: 1;
      padding: 20px;
    }

    input, select {
      padding: 10px;
      margin: 5px;
      width: 200px;
    }

    button {
      padding: 10px 15px;
      background: #1e2a3a;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>The Crafted Corners</h2>

  <div class="menu" onclick="show('variant')">Add Variant</div>
</div>

<div class="content">

  <div id="variant">
    <h2>Add Variant</h2>

    <input id="name" placeholder="Variant Name"><br>
    <input id="catalogue" placeholder="Catalogue ID (CAT001)"><br>
    <input id="hsn" placeholder="HSN"><br>
    <input id="gst" placeholder="GST"><br>
    <input id="rrp" placeholder="RRP"><br>

    <button onclick="save()">Save</button>
  </div>

</div>

<script>
const API = "https://sheetdb.io/api/v1/tbkom437rmn5o";

// generate ID
function generateID() {
  return "VAR" + Math.floor(1000 + Math.random() * 9000);
}

// save data
function save() {

  const data = {
    VariantID: generateID(),
    CatalogueID: document.getElementById("catalogue").value,
    VariantName: document.getElementById("name").value,
    HSN: document.getElementById("hsn").value,
    GST: document.getElementById("gst").value,
    RRP: document.getElementById("rrp").value
  };

  fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ data: [data] })
  })
  .then(res => res.json())
  .then(() => {
    alert("Saved!");
  });

}
</script>

</body>
</html>
