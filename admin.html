<!DOCTYPE html>
<html>
<body>

<script>
if (prompt("Password?") !== "admin123") {
  document.body.innerHTML = "Access Denied";
}
</script>

<h2>Admin</h2>
<table border="1" id="t"></table>

<script>
const API = "https://sheetdb.io/api/v1/z4rjokjijd72d";

fetch(API).then(r=>r.json()).then(d=>{

let html="<tr><th>Name</th><th>Price</th><th>Save</th></tr>";

d.forEach(p=>{
html+=`
<tr>
<td>${p.VariantName}</td>
<td><input id="${p.VariantID}" value="${p.RRP}"></td>
<td><button onclick="u('${p.VariantID}')">Save</button></td>
</tr>`;
});

t.innerHTML=html;

});

function u(id){
const v=document.getElementById(id).value;

fetch(API+"/VariantID/"+id,{
method:"PATCH",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({data:{RRP:v}})
}).then(()=>alert("Updated"));
}
</script>

</body>
</html>
