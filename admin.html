<script>
const API = "https://sheetdb.io/api/v1/tbkom437rmn5o";

let allData = [];

fetch(API)
.then(r => r.json())
.then(data => {

  console.log(data);

  if (!data.length) {
    document.body.innerHTML = "No data";
    return;
  }

  allData = data;
  document.getElementById("count").innerText = data.length;

});

function loadVariants() {

  let html = "<tr><th>Variant</th><th>Price</th><th>Update</th></tr>";

  allData.forEach(p => {

    html += `
    <tr>
      <td>${p["Variant Name"]}</td>
      <td><input id="${p["Variant ID"]}" value="${p["RRP"]}"></td>
      <td><button onclick="update('${p["Variant ID"]}')">Save</button></td>
    </tr>`;
  });

  document.getElementById("table").innerHTML = html;
}

function update(id) {

  const val = document.getElementById(id).value;

  fetch(API + "/Variant ID/" + id, {
    method: "PATCH",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      data: { RRP: val }
    })
  })
  .then(() => alert("Updated"));
}
</script>
