<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
</head>

<body>

<h2>Admin Panel</h2>

<table border="1" id="table"></table>

<script>
const API = "https://sheetdb.io/api/v1/z4rjokjijd72d";

fetch(API)
.then(r => r.json())
.then(data => {

  let html = "<tr><th>Name</th><th>Price</th><th>Update</th></tr>";

  data.forEach(p => {
    html += `
    <tr>
      <td>${p.VariantName}</td>
      <td><input value="${p.RRP}" id="${p.VariantID}"></td>
      <td><button onclick="update('${p.VariantID}')">Save</button></td>
    </tr>`;
  });

  document.getElementById("table").innerHTML = html;
});

function update(id) {
  const val = document.getElementById(id).value;

  fetch(API + "/VariantID/" + id, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ data: { RRP: val } })
  })
  .then(() => alert("Updated"));
}
</script>

</body>
</html>
