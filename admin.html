<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  background: #f5f3ef;
}

/* SIDEBAR */
.sidebar {
  width: 250px;
  height: 100vh;
  background: #1e2a44;
  color: white;
  position: fixed;
}

.sidebar h2 {
  padding: 20px;
  color: #f5a623;
}

.menu div {
  padding: 12px 15px;
  margin: 5px;
  border-radius: 8px;
  cursor: pointer;
}

.menu div:hover {
  background: #2c3b5e;
}

.active {
  background: #f5a623;
  color: black;
}

/* MAIN */
.main {
  margin-left: 250px;
  padding: 20px;
  width: 100%;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
}

.card h3 {
  margin: 0;
  font-size: 14px;
  color: #777;
}

.card p {
  font-size: 28px;
  margin: 5px 0 0;
}

/* TABLE */
table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
  background: white;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #eee;
}

input {
  width: 80px;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Admin Panel</h2>

  <div class="menu">
    <div class="active" onclick="showDashboard()">Dashboard</div>
    <div onclick="loadVariants()">Variant Management</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <h1>Dashboard</h1>
  <p>Overview of your catalogue system</p>

  <div class="cards">
    <div class="card">
      <h3>Total Variants</h3>
      <p id="variantCount">0</p>
    </div>
  </div>

  <table id="table"></table>

</div>

<script>
const API = "https://sheetdb.io/api/v1/tbkom437rmn5o";

let allData = [];
let idKey = "";

// LOAD DATA
fetch(API)
.then(r => r.json())
.then(data => {

  console.log("ADMIN DATA:", data);

  if (!data || data.length === 0) {
    document.body.innerHTML = "No data found in sheet";
    return;
  }

  allData = data;

  // detect ID column automatically
  const sample = data[0];
  idKey = Object.keys(sample).find(k =>
    k.toLowerCase().includes("variant")
  );

  document.getElementById("variantCount").innerText = data.length;

})
.catch(err => {
  document.body.innerHTML = "Error loading data";
});

// DASHBOARD
function showDashboard() {
  document.getElementById("table").innerHTML = "";
}

// LOAD VARIANTS
function loadVariants() {

  let html = "<tr><th>Variant</th><th>Price</th><th>Update</th></tr>";

  allData.forEach(p => {

    const name = p.VariantName || p["Variant Name"] || "-";
    const id = p[idKey];
    const price = p.RRP || "0";

    html += `
    <tr>
      <td>${name}</td>
      <td><input id="${id}" value="${price}"></td>
      <td><button onclick="update('${id}')">Save</button></td>
    </tr>`;
  });

  document.getElementById("table").innerHTML = html;
}

// UPDATE PRICE
function update(id) {

  const value = document.getElementById(id).value;

  fetch(API + "/" + idKey + "/" + id, {
    method: "PATCH",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      data: { RRP: value }
    })
  })
  .then(() => alert("Updated successfully"))
  .catch(() => alert("Update failed"));
}
</script>

</body>
</html>
