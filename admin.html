<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Panel</title>

<style>
body {
  margin:0;
  font-family:Arial;
  display:flex;
  background:#f5f3ef;
}

/* SIDEBAR */
.sidebar {
  width:250px;
  height:100vh;
  background:#1e2a44;
  color:#fff;
  position:fixed;
}

.sidebar h2 {
  padding:20px;
  color:#f5a623;
}

.menu div {
  padding:12px 15px;
  margin:5px;
  border-radius:8px;
  cursor:pointer;
}

.menu div:hover { background:#2c3b5e; }

.active {
  background:#f5a623;
  color:#000;
}

/* MAIN */
.main {
  margin-left:250px;
  padding:20px;
  width:100%;
}

table {
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
  background:#fff;
}

th, td {
  padding:10px;
  border-bottom:1px solid #eee;
}

input { width:80px; }
</style>
</head>

<body>

<div class="sidebar">
  <h2>Admin</h2>
  <div class="menu">
    <div class="active" onclick="showDashboard()">Dashboard</div>
    <div onclick="loadVariants()">Variant Management</div>
  </div>
</div>

<div class="main">

  <h1>Dashboard</h1>
  <p>Total Variants: <span id="count">0</span></p>

  <table id="table"></table>

</div>

<script>
const API = "https://sheetdb.io/api/v1/tbkom437rmn5o";

let allData = [];

fetch(API)
.then(r => r.json())
.then(data => {

  if (!data || data.length === 0) {
    document.body.innerHTML = "No data found";
    return;
  }

  allData = data;
  document.getElementById("count").innerText = data.length;

});

function showDashboard() {
  document.getElementById("table").innerHTML = "";
}

function loadVariants() {

  let html = "<tr><th>Variant</th><th>Price</th><th>Update</th></tr>";

  allData.forEach(p => {

    html += `
    <tr>
      <td>${p["Variant Name"]}</td>
      <td><input id="${p["Variant ID"]}" value="${p["RRP"] || 0}"></td>
      <td><button onclick="update('${p["Variant ID"]}')">Save</button></td>
    </tr>`;
  });

  document.getElementById("table").innerHTML = html;
}

function update(id) {

  const val = document.getElementById(id).value;

  fetch(API + "/Variant ID/" + id, {
    method:"PATCH",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      data:{ RRP: val }
    })
  })
  .then(()=>alert("Updated"));
}
</script>

</body>
</html>
