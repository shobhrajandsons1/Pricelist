<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Panel</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
}

h1 {
  margin-bottom: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

td, th {
  border: 1px solid #ddd;
  padding: 8px;
  font-size: 13px;
}

input {
  width: 80px;
}
</style>
</head>

<body>

<h1>Admin Panel</h1>

<table>
<tr>
  <th>Variant</th>
  <th>Price</th>
  <th>Update</th>
</tr>

<tbody id="table"></tbody>
</table>

<script>
const API = "https://script.google.com/macros/s/AKfycbz-PgHsEI_GpQYjzxqUP47S0SLXC6QAj6ddnQ_8gAU9SznOWJLMzPkNde1U29IfLcZc/exec";

fetch(API + "?mode=admin")
.then(r => r.json())
.then(d => {

  let html = "";

  d.variants.forEach(v => {
    html += `
    <tr>
      <td>${v[2]}</td>
      <td><input id="p${v[0]}" value="${v[11]}"></td>
      <td><button onclick="update('${v[0]}')">Save</button></td>
    </tr>`;
  });

  document.getElementById("table").innerHTML = html;
});

function update(id) {
  const value = document.getElementById("p" + id).value;

  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      id: id,
      price: value
    })
  })
  .then(() => alert("Updated successfully"));
}
</script>

</body>
</html>
