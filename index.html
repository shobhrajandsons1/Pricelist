<!DOCTYPE html>
<html>
<head>
  <title>Pricelist</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    th {
      background: #222;
      color: #fff;
    }
  </style>
</head>

<body>

<h1 id="title">Pricelist</h1>

<table>
  <thead>
    <tr>
      <th>Variant</th>
      <th>HSN</th>
      <th>GST %</th>
      <th>RRP (₹)</th>
    </tr>
  </thead>

  <!-- IMPORTANT -->
  <tbody id="data"></tbody>
</table>

<script>
const API = "https://sheetdb.io/api/v1/tbkom437rmn5o?sheet=Variants";

function clean(val) {
  return (val || "").toString().trim().toUpperCase();
}

// get catalogue from URL
const params = new URLSearchParams(window.location.search);
let currentId = clean(params.get("catalogue"));

if (!currentId) {
  document.body.innerHTML = "No catalogue selected";
}

// fetch data
fetch(API)
.then(res => res.json())
.then(data => {

  const filtered = data.filter(row =>
    clean(row.CatalogueID) === currentId
  );

  if (!filtered.length) {
    document.body.innerHTML = "No catalogue found";
    return;
  }

  let html = "";

  filtered.forEach(p => {
    html += `
      <tr>
        <td>${p.VariantName || "-"}</td>
        <td>${p.HSN || "-"}</td>
        <td>${p.GST || "0"}</td>
        <td>₹ ${Number(p.RRP || 0).toLocaleString("en-IN")}</td>
      </tr>
    `;
  });

  document.getElementById("data").innerHTML = html;

});
</script>

</body>
</html>
