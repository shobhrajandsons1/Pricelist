<script>
const API = "https://sheetdb.io/api/v1/tbkom437rmn5o";

let currentId = new URLSearchParams(window.location.search).get("catalogue_id");

fetch(API)
.then(r => r.json())
.then(allData => {

  console.log(allData);

  if (!allData.length) {
    document.body.innerHTML = "No data found";
    return;
  }

  // ✅ USE YOUR EXACT COLUMN NAME
  if (!currentId) currentId = allData[0]["Cataloge ID"];

  const data = allData.filter(x => x["Cataloge ID"] == currentId);

  if (!data.length) {
    document.body.innerHTML = "No catalogue found";
    return;
  }

  let html = "";

  data.forEach(p => {
    html += `
    <tr>
      <td>${p["Variant Name"]}</td>
      <td>${p["HSN"]}</td>
      <td>${p["GST %"]}</td>
      <td class="right">₹ ${Number(p["RRP"]).toLocaleString("en-IN")}</td>
    </tr>`;
  });

  document.getElementById("data").innerHTML = html;
});
</script>
