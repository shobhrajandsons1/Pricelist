<script>
const API = "https://sheetdb.io/api/v1/tbkom437rmn5o";

let currentId = new URLSearchParams(window.location.search).get("catalogue_id");

// 🔥 normalize function (VERY IMPORTANT)
function clean(val) {
  return String(val || "")
    .replace(/\u00A0/g, "")   // remove non-breaking space
    .trim()
    .toUpperCase();
}

fetch(API)
.then(r => r.json())
.then(allData => {

  console.log("RAW DATA:", allData);

  if (!allData.length) {
    document.body.innerHTML = "No data found";
    return;
  }

  // 🔥 HARDCODE YOUR COLUMN (SAFE NOW)
  const catalogueKey = "Cataloge ID";

  // normalize URL id
  currentId = clean(currentId);

  console.log("Looking for:", currentId);

  const data = allData.filter(x =>
    clean(x[catalogueKey]) === currentId
  );

  console.log("MATCHED DATA:", data);

  if (!data.length) {
    document.body.innerHTML = "No catalogue found";
    return;
  }

  let html = "";

  data.forEach(p => {
    html += `
    <tr>
      <td>${p["Variant Name"]}</td>
      <td>${p["HSN"]}</td>
      <td>${p["GST %"]}</td>
      <td class="right">₹ ${Number(p["RRP"]).toLocaleString("en-IN")}</td>
    </tr>`;
  });

  document.getElementById("data").innerHTML = html;

});
</script>
