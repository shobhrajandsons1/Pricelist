<!DOCTYPE html>
<html>
<head>
  <title>Pricelist</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 25px;
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
    }

    .logo img {
      height: 45px;
    }

    .brandName {
      font-size: 18px;
      font-weight: 600;
      color: #1f2937;
    }

    /* TITLE */
    .catalogueTitle {
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      margin: 20px 0 10px;
      color: #111827;
    }

    /* CARD CONTAINER */
    .container {
      padding: 20px;
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      overflow: hidden;
    }

    /* TABLE */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 16px;
      text-align: center;
    }

    th {
      background: #111827;
      color: white;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    tr {
      border-bottom: 1px solid #f1f1f1;
    }

    tr:hover {
      background: #fafafa;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .catalogueTitle {
        font-size: 22px;
      }

      th, td {
        padding: 10px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img id="brandLogo" src="">
  </div>

  <div class="brandName" id="brandName">Loading...</div>
</div>

<div class="catalogueTitle" id="catalogueName">Loading...</div>

<div class="container">
  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Variant</th>
          <th>HSN</th>
          <th>GST %</th>
          <th>RRP (₹)</th>
        </tr>
      </thead>
      <tbody id="data"></tbody>
    </table>
  </div>
</div>

<script>
const VARIANT_API = "https://sheetdb.io/api/v1/tbkom437rmn5o?sheet=Variants";
const CATALOGUE_API = "https://sheetdb.io/api/v1/tbkom437rmn5o?sheet=Catalogues";
const BRAND_API = "https://sheetdb.io/api/v1/tbkom437rmn5o?sheet=Brand";

function clean(val) {
  return (val || "").toString().trim().toUpperCase();
}

const params = new URLSearchParams(window.location.search);
const currentId = clean(params.get("catalogue"));

if (!currentId) {
  document.body.innerHTML = "No catalogue selected";
}

fetch(CATALOGUE_API)
.then(res => res.json())
.then(catalogues => {

  const cat = catalogues.find(c => clean(c.CatalogueID) === currentId);

  if (!cat) {
    document.body.innerHTML = "Catalogue not found";
    return;
  }

  document.getElementById("catalogueName").innerText = cat.CatalogueName;

  fetch(BRAND_API)
  .then(res => res.json())
  .then(brands => {

    const brand = brands.find(b =>
      clean(b["Brand ID"]) === clean(cat.BrandID)
    );

    if (brand) {
      document.getElementById("brandName").innerText =
        brand["Brand Name"];

      if (brand["Logo URL"]) {
        document.getElementById("brandLogo").src =
          brand["Logo URL"];
      }
    }

  });

});

fetch(VARIANT_API)
.then(res => res.json())
.then(data => {

  const filtered = data.filter(row =>
    clean(row.CatalogueID) === currentId
  );

  if (!filtered.length) {
    document.getElementById("data").innerHTML =
      "<tr><td colspan='4'>No data found</td></tr>";
    return;
  }

  let html = "";

  filtered.forEach(p => {
    html += `
      <tr>
        <td>${p.VariantName || "-"}</td>
        <td>${p.HSN || "-"}</td>
        <td>${p.GST || "0"}</td>
        <td>₹ ${Number(p.RRP || 0).toLocaleString("en-IN")}</td>
      </tr>
    `;
  });

  document.getElementById("data").innerHTML = html;

});
</script>

</body>
</html>
