<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Catalogue Pricelist</title>

<style>
body { font-family: Arial; background:#f4f4f4; margin:0; }

.header {
  display:flex; align-items:center;
  padding:15px 25px; background:#fff; border-bottom:1px solid #ddd;
}

.logo { height:45px; }

.title {
  text-align:center; font-size:26px; margin:20px 0;
}

.container { width:92%; margin:auto; }

table {
  width:100%; border-collapse:collapse; background:#fff;
}

th {
  background:#1f1f1f; color:#fff; padding:14px;
}

td {
  padding:14px; border-bottom:1px solid #eee;
}

.right { text-align:right; }

.footer {
  width:92%; margin:20px auto;
  display:flex; justify-content:space-between;
  font-size:13px; color:#555;
}
</style>
</head>

<body>

<div class="header">
  <img id="logo" class="logo">
</div>

<div class="title" id="catalogue">Loading...</div>

<div class="container">
<table>
<thead>
<tr>
  <th>DESIGN / VARIANT</th>
  <th>HSN CODE</th>
  <th>GST %</th>
  <th class="right">RRP (₹)</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>

<div class="footer">
  <div>© 2025 Pricelist</div>
  <div id="date"></div>
</div>

<script>
const API = "https://sheetdb.io/api/v1/tbkom437rmn5o";

let currentId = new URLSearchParams(window.location.search).get("catalogue_id");

fetch(API)
.then(r => r.json())
.then(allData => {

  if (!allData || allData.length === 0) {
    document.body.innerHTML = "<h3>No data found</h3>";
    return;
  }

  if (!currentId) currentId = allData[0]["Cataloge ID"];

  renderCatalogue(allData, currentId);

});

function renderCatalogue(allData, id) {

  const data = allData.filter(x => x["Cataloge ID"] == id);

  if (!data.length) {
    document.body.innerHTML = "<h3>No catalogue found</h3>";
    return;
  }

  document.getElementById("catalogue").innerText = id;

  let html = "";

  data.forEach(p => {

    html += `
    <tr>
      <td>${p["Variant Name"] || "-"}</td>
      <td>${p["HSN"] || "-"}</td>
      <td>${p["GST %"] || "0"}</td>
      <td class="right">₹ ${formatPrice(p["RRP"] || 0)}</td>
    </tr>`;
  });

  document.getElementById("data").innerHTML = html;

  document.getElementById("date").innerText =
    "With effect from " + new Date().toLocaleDateString();
}

function formatPrice(num) {
  return Number(num).toLocaleString("en-IN");
}
</script>

</body>
</html>
