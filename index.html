<script>
const API = "https://sheetdb.io/api/v1/tbkom437rmn5o?sheet=Variants";

// clean helper
function clean(val) {
  return (val || "").toString().trim().toUpperCase();
}

// get catalogue from URL
const params = new URLSearchParams(window.location.search);
let currentId = clean(params.get("catalogue"));

fetch(API)
.then(res => res.json())
.then(data => {

  console.log("DATA:", data);

  if (!data || data.length === 0) {
    document.body.innerHTML = "No data found";
    return;
  }

  // filter correctly
  const filtered = data.filter(row =>
    clean(row.CatalogueID) === currentId
  );

  console.log("FILTERED:", filtered);

  if (!filtered.length) {
    document.body.innerHTML = "No catalogue found";
    return;
  }

  let html = "";

  filtered.forEach(p => {
    html += `
      <tr>
        <td>${p.VariantName || "-"}</td>
        <td>${p.HSN || "-"}</td>
        <td>${p.GST || "0"}</td>
        <td>₹ ${Number(p.RRP || 0).toLocaleString("en-IN")}</td>
      </tr>
    `;
  });

  document.getElementById("data").innerHTML = html;
})
.catch(err => {
  console.error(err);
  document.body.innerHTML = "Error loading data";
});
</script>
