<script>
const API = "https://sheetdb.io/api/v1/tbkom437rmn5o";

let currentId = new URLSearchParams(window.location.search).get("catalogue_id");

fetch(API)
.then(r => r.json())
.then(allData => {

  console.log("FULL DATA:", allData);

  if (!allData.length) {
    document.body.innerHTML = "No data found";
    return;
  }

  // 🔍 find correct column dynamically
  const sample = allData[0];
  const catalogueKey = Object.keys(sample).find(k =>
    k.toLowerCase().includes("catalog")
  );

  console.log("Detected column:", catalogueKey);

  if (!catalogueKey) {
    document.body.innerHTML = "Catalogue column not found";
    return;
  }

  // normalize function
  const clean = (val) => String(val || "").trim().toUpperCase();

  // normalize URL id
  if (!currentId) currentId = clean(sample[catalogueKey]);
  currentId = clean(currentId);

  console.log("Looking for:", currentId);

  // filter safely
  const data = allData.filter(x =>
    clean(x[catalogueKey]) === currentId
  );

  console.log("Filtered:", data);

  if (!data.length) {
    document.body.innerHTML = "No catalogue found";
    return;
  }

  let html = "";

  data.forEach(p => {
    html += `
    <tr>
      <td>${p["Variant Name"]}</td>
      <td>${p["HSN"]}</td>
      <td>${p["GST %"]}</td>
      <td class="right">₹ ${Number(p["RRP"]).toLocaleString("en-IN")}</td>
    </tr>`;
  });

  document.getElementById("data").innerHTML = html;

});
</script>
