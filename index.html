<!DOCTYPE html>
<html>
<head>
  <title>Pricelist</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: white;
      border-bottom: 1px solid #ddd;
    }

    .logo img {
      height: 45px;
    }

    .brandName {
      font-size: 18px;
      font-weight: 600;
    }

    /* Catalogue Title */
    .catalogueTitle {
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      margin: 15px 0;
    }

    /* TABLE */
    .container {
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      padding: 14px;
      text-align: center;
    }

    th {
      background: #222;
      color: white;
    }

    tr {
      border-bottom: 1px solid #eee;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .catalogueTitle {
        font-size: 20px;
      }

      th, td {
        padding: 10px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <img id="brandLogo" src="" alt="Logo">
  </div>

  <div class="brandName" id="brandName">
    Loading...
  </div>
</div>

<!-- Catalogue Name -->
<div class="catalogueTitle" id="catalogueName">
  Loading...
</div>

<!-- TABLE -->
<div class="container">
  <table>
    <thead>
      <tr>
        <th>Variant</th>
        <th>HSN</th>
        <th>GST %</th>
        <th>RRP (₹)</th>
      </tr>
    </thead>

    <tbody id="data"></tbody>
  </table>
</div>

<script>
const VARIANT_API = "https://sheetdb.io/api/v1/tbkom437rmn5o?sheet=Variants";
const CATALOGUE_API = "https://sheetdb.io/api/v1/tbkom437rmn5o?sheet=Catalogues";
const BRAND_API = "https://sheetdb.io/api/v1/tbkom437rmn5o?sheet=Brand";

function clean(val) {
  return (val || "").toString().trim().toUpperCase();
}

const params = new URLSearchParams(window.location.search);
const currentId = clean(params.get("catalogue"));

if (!currentId) {
  document.body.innerHTML = "No catalogue selected";
}

// STEP 1: LOAD CATALOGUE + BRAND
fetch(CATALOGUE_API)
.then(res => res.json())
.then(catalogues => {

  const cat = catalogues.find(c => clean(c.CatalogueID) === currentId);

  if (!cat) {
    document.body.innerHTML = "Catalogue not found";
    return;
  }

  // Set catalogue name
  document.getElementById("catalogueName").innerText = cat.CatalogueName;

  // Load brand details
  fetch(BRAND_API)
  .then(res => res.json())
  .then(brands => {

    const brand = brands.find(b => clean(b.BrandID) === clean(cat.BrandID));

    if (brand) {
      document.getElementById("brandName").innerText = brand.BrandName || "Brand";

      if (brand.LogoURL) {
        document.getElementById("brandLogo").src = brand.LogoURL;
      }
    }

  });

});

// STEP 2: LOAD VARIANTS
fetch(VARIANT_API)
.then(res => res.json())
.then(data => {

  const filtered = data.filter(row =>
    clean(row.CatalogueID) === currentId
  );

  if (!filtered.length) {
    document.getElementById("data").innerHTML =
      "<tr><td colspan='4'>No data found</td></tr>";
    return;
  }

  let html = "";

  filtered.forEach(p => {
    html += `
      <tr>
        <td>${p.VariantName || "-"}</td>
        <td>${p.HSN || "-"}</td>
        <td>${p.GST || "0"}</td>
        <td>₹ ${Number(p.RRP || 0).toLocaleString("en-IN")}</td>
      </tr>
    `;
  });

  document.getElementById("data").innerHTML = html;

});
</script>

</body>
</html>
