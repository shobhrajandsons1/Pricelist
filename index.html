<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Catalogue Pricelist</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  margin: 0;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  padding: 15px 25px;
  background: white;
  border-bottom: 1px solid #ddd;
}

.logo {
  height: 45px;
}

/* TITLE */
.title {
  text-align: center;
  font-size: 26px;
  margin: 20px 0;
  letter-spacing: 1px;
}

/* TABLE */
.container {
  width: 92%;
  margin: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th {
  background: #1f1f1f;
  color: white;
  padding: 14px;
  text-align: left;
  font-size: 14px;
}

td {
  padding: 14px;
  border-bottom: 1px solid #eee;
  font-size: 14px;
}

.right {
  text-align: right;
}

tr:hover {
  background: #fafafa;
}

/* FOOTER */
.footer {
  width: 92%;
  margin: 20px auto;
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: #555;
}
</style>
</head>

<body>

<div class="header">
  <img id="logo" class="logo">
</div>

<div class="title" id="catalogue">Loading...</div>

<div class="container">

<table>
<thead>
<tr>
  <th>DESIGN / VARIANT</th>
  <th>HSN CODE</th>
  <th>GST %</th>
  <th class="right">RRP (₹)</th>
</tr>
</thead>

<tbody id="data"></tbody>

</table>

</div>

<div class="footer">
  <div>© 2025 Pricelist</div>
  <div id="date"></div>
</div>

<script>
const API = "https://sheetdb.io/api/v1/tbkom437rmn5o";

// Get catalogue_id from URL
let currentId = new URLSearchParams(window.location.search).get("catalogue_id");

fetch(API)
.then(r => r.json())
.then(allData => {

  console.log("DATA:", allData);

  // ❌ No data at all
  if (!allData || allData.length === 0) {
    document.body.innerHTML = "<h3>No data found in sheet</h3>";
    return;
  }

  // Detect correct field name automatically
  const sample = allData[0];
  let catalogueKey = Object.keys(sample).find(k =>
    k.toLowerCase().includes("catalogue")
  );

  if (!catalogueKey) {
    document.body.innerHTML = "<h3>CatalogueID column not found</h3>";
    return;
  }

  // If no ID passed → use first
  if (!currentId) currentId = sample[catalogueKey];

  renderCatalogue(allData, currentId, catalogueKey);

})
.catch(err => {
  document.body.innerHTML = "<h3>Error loading data</h3>";
  console.error(err);
});

function renderCatalogue(allData, id, catalogueKey) {

  const data = allData.filter(x => x[catalogueKey] == id);

  if (!data.length) {
    document.body.innerHTML = "<h3>No catalogue found</h3>";
    return;
  }

  // Safe field access
  const first = data[0];

  document.getElementById("catalogue").innerText =
    first.CatalogueName || "Catalogue";

  document.getElementById("logo").src =
    first.LogoURL || "https://via.placeholder.com/120x40?text=LOGO";

  let html = "";

  data.forEach(p => {

    const name = p.VariantName || p["Variant Name"] || "-";
    const hsn = p.HSN || "-";
    const gst = p.GST || "0";
    const rrp = p.RRP || "0";

    html += `
    <tr>
      <td>${name}</td>
      <td>${hsn}</td>
      <td>${gst}</td>
      <td class="right">₹ ${formatPrice(rrp)}</td>
    </tr>`;
  });

  document.getElementById("data").innerHTML = html;

  document.getElementById("date").innerText =
    "With effect from " + new Date().toLocaleDateString();
}

// Format ₹ nicely
function formatPrice(num) {
  return Number(num).toLocaleString("en-IN");
}
</script>

</body>
</html>
